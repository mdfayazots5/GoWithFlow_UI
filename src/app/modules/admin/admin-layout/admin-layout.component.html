<div class="admin-shell">
  <div class="sidebar-overlay" [class.visible]="sidebarOpen" (click)="closeSidebar()"></div>

  <aside class="admin-sidebar" [class.open]="sidebarOpen">
    <div class="sidebar-logo">
      <div class="sidebar-logo-icon">G</div>
      <div>
        <div style="font-weight: 700; color: white; font-size: 18px; line-height: 1;">GoWithFlow</div>
        <div style="font-size: 10px; color: rgba(255,255,255,0.5); letter-spacing: 1px; margin-top: 2px;">ADMIN CONSOLE</div>
      </div>
    </div>

    <div class="sidebar-section-label">Main Menu</div>
    
    <nav class="sidebar-nav">
      <a routerLink="/admin/dashboard" routerLinkActive="active" class="nav-item" (click)="closeSidebar()">
        <mat-icon>dashboard</mat-icon>
        <span>Dashboard</span>
      </a>
      <a routerLink="/admin/users" routerLinkActive="active" class="nav-item" (click)="closeSidebar()">
        <mat-icon>people</mat-icon>
        <span>Users</span>
      </a>
      <a routerLink="/admin/scripts" routerLinkActive="active" class="nav-item" (click)="closeSidebar()">
        <mat-icon>description</mat-icon>
        <span>Scripts</span>
      </a>
      <a routerLink="/admin/reports" routerLinkActive="active" class="nav-item" (click)="closeSidebar()">
        <mat-icon>bar_chart</mat-icon>
        <span>Reports</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="sidebar-user">
        <img [src]="adminAvatar" alt="Admin" class="sidebar-user-avatar" onerror="this.src='https://ui-avatars.com/api/?name=Admin&background=3D5A99&color=fff'">
        <div style="flex: 1; min-width: 0;">
          <div class="sidebar-user-name">{{ adminName }}</div>
          <div class="sidebar-user-role">Administrator</div>
        </div>
        <button mat-icon-button (click)="logout()" style="color: #7A8CA8;">
          <mat-icon>logout</mat-icon>
        </button>
      </div>
    </div>
  </aside>

  <div class="admin-main">
    <header class="admin-topbar">
      <div style="display: flex; align-items: center; gap: 16px;">
        <button mat-icon-button class="hamburger-btn" (click)="toggleSidebar()">
          <mat-icon>menu</mat-icon>
        </button>
        <div>
          <div class="topbar-breadcrumb-sub">Administration</div>
          <h1 class="topbar-breadcrumb-title">{{ pageTitle() }}</h1>
        </div>
      </div>

      <div style="display: flex; align-items: center; gap: 16px;">
        <div class="topbar-admin-info" style="text-align: right;">
          <div class="topbar-admin-name">{{ adminName }}</div>
          <div class="topbar-admin-role">Administrator</div>
        </div>
        <img [src]="adminAvatar" alt="Admin" class="topbar-avatar" onerror="this.src='https://ui-avatars.com/api/?name=Admin&background=3D5A99&color=fff'">
      </div>
    </header>

    <main class="admin-content">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
