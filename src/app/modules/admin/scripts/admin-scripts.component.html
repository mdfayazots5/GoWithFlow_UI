<div class="scripts-page">

  <div class="scripts-stats-bar">
    <div class="scripts-stat-card">
      <div class="stat-icon-wrap blue">
        <i-lucide [img]="ScriptIcon" size="22"></i-lucide>
      </div>
      <div>
        <p class="stat-num">42</p>
        <p class="stat-lbl">Total Scripts</p>
      </div>
    </div>
    <div class="scripts-stat-card">
      <div class="stat-icon-wrap green">
        <i-lucide [img]="ActiveIcon" size="22"></i-lucide>
      </div>
      <div>
        <p class="stat-num">38</p>
        <p class="stat-lbl">Active Scripts</p>
      </div>
    </div>
    <div class="scripts-stat-card">
      <div class="stat-icon-wrap orange">
        <i-lucide [img]="LineIcon" size="22"></i-lucide>
      </div>
      <div>
        <p class="stat-num">1.2k</p>
        <p class="stat-lbl">Total Utterances</p>
      </div>
    </div>
  </div>

  <div class="scripts-controls">
    <div class="scripts-search">
      <i-lucide [img]="SearchIcon" size="16" class="search-icon"></i-lucide>
      <input type="text" placeholder="Search by Title or Tag..." class="search-input">
    </div>
    <button type="button" class="btn-upload" (click)="goToUpload()">
      <mat-icon>upload_file</mat-icon>
      Upload New Script
    </button>
  </div>

  <div class="scripts-table-card">
    <div class="table-scroll">
      <table mat-table [dataSource]="scripts()" class="w-full">

        <ng-container matColumnDef="title">
          <th mat-header-cell *matHeaderCellDef>TITLE</th>
          <td mat-cell *matCellDef="let row">
            <div class="cell-title">
              <span class="cell-title-main">{{ row.scriptTitle }}</span>
              <span class="cell-title-sub">ID: {{ row.id }}</span>
            </div>
          </td>
        </ng-container>

        <ng-container matColumnDef="category">
          <th mat-header-cell *matHeaderCellDef>CATEGORY</th>
          <td mat-cell *matCellDef="let row">
            <span class="chip" [ngClass]="getCategoryClass(row.category)">{{ row.category }}</span>
          </td>
        </ng-container>

        <ng-container matColumnDef="tag">
          <th mat-header-cell *matHeaderCellDef>GRAMMAR TAG</th>
          <td mat-cell *matCellDef="let row">
            <span class="tag-pill">{{ row.grammarFocusTag }}</span>
          </td>
        </ng-container>

        <ng-container matColumnDef="lines">
          <th mat-header-cell *matHeaderCellDef class="text-center">LINES</th>
          <td mat-cell *matCellDef="let row" class="text-center cell-bold">{{ row.utteranceCount || 5 }}</td>
        </ng-container>

        <ng-container matColumnDef="status">
          <th mat-header-cell *matHeaderCellDef class="text-center">STATUS</th>
          <td mat-cell *matCellDef="let row" class="text-center">
            <span class="status-dot" [class.active]="row.active !== false"></span>
          </td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef>ACTIONS</th>
          <td mat-cell *matCellDef="let row">
            <div class="action-btns">
              <button type="button" mat-icon-button class="icon-btn-primary" title="View Details">
                <mat-icon>visibility</mat-icon>
              </button>
              <button type="button" mat-icon-button class="icon-btn-muted" title="Toggle Active" (click)="toggleScript(row)">
                <mat-icon>power_settings_new</mat-icon>
              </button>
              <button type="button" mat-icon-button class="icon-btn-success" title="Download" (click)="downloadSample()">
                <mat-icon>file_download</mat-icon>
              </button>
            </div>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>
    </div>
    <mat-paginator [pageSize]="10"></mat-paginator>
  </div>

</div>
